# Only declares where the serverless functions live + how to bundle them.
# Does NOT set a build command or publish dir, so the existing static-site
# deploy settings (configured in the Netlify dashboard) are left untouched.
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Old loyalty page folded into the new Fifth Moon home (one loyalty page,
# not two). Anyone landing on the legacy URL gets sent on cleanly.
[[redirects]]
  from = "/rewards.html"
  to = "/fifth-moon.html"
  status = 301
