<?xml version="1.0" encoding="UTF-8"?>
<!--
  Brand-mark icon — JUST the moon, on a transparent background.
  Laura 2026-06-13: 'just inside the circle, not a square.'
  The favicon / apple-touch-icon / PWA icons render as a circle,
  not a square card. The phase shadow + gold ring + soft outer
  glow are layered ON TOP of the gold disc by scripts/og-moon-phase.py
  so the icon tracks the actual moon phase daily.
  Canvas: 512×512. Moon: cx=256, cy=256, r=155.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="moonGold" cx="36%" cy="32%" r="72%">
      <stop offset="0%" stop-color="#FFF6E0"/>
      <stop offset="42%" stop-color="#EAC979"/>
      <stop offset="100%" stop-color="#7A5F1F"/>
    </radialGradient>
  </defs>
  <!-- The moon disc. og-moon-phase.py finds this exact element and
       injects the phase shadow + gold corona + soft outer glow
       between the disc and the canvas edge. -->
  <circle cx="256" cy="256" r="155" fill="url(#moonGold)"/>
</svg>
