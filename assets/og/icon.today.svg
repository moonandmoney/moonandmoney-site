<?xml version="1.0" encoding="UTF-8"?>
<!--
  Brand-mark icon — JUST the moon, on a transparent background,
  scaled so the moon + corona ring nearly fill the canvas. Designed
  for use at tiny favicon sizes (16/32px) where every pixel of moon
  visibility matters.
  Laura 2026-06-13:
    pass 1: 'just inside the circle, not a square boo'
    pass 2: 'please fix the tab icon!' (the moon was 38% of the
            canvas so at 16px it was a dot — bumped to fill it)
  Canvas: 512×512.  Moon: cx=256, cy=256, r=215.
  After scripts/og-moon-phase.py injects shadow + ring + glow:
    moon disc at r=215
    primary corona ring at r=232 (215 + 17)
    soft outer glow at r=247 (215 + 32) — fits inside 256 viewport
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="moonGold" cx="36%" cy="32%" r="72%">
      <stop offset="0%" stop-color="#FFF6E0"/>
      <stop offset="42%" stop-color="#EAC979"/>
      <stop offset="100%" stop-color="#7A5F1F"/>
    </radialGradient>
  </defs>
  <!-- The moon disc. og-moon-phase.py finds this exact element and
       injects the phase shadow + gold corona + soft outer glow
       between the disc and the canvas edge. -->
  <circle cx="256" cy="256" r="215" fill="url(#moonGold)"/>
  <path d="M 256 41 A 215 215 0 0 0 256 471 A 82.9675 215 0 0 0 256 41 Z" fill="#070608" fill-opacity="1.0"/>
  <circle cx="256" cy="256" r="247" fill="none" stroke="#E5C77B" stroke-opacity="0.3" stroke-width="8.0"/>
  <circle cx="256" cy="256" r="232" fill="none" stroke="#E5C77B" stroke-opacity="1.0" stroke-width="6.0"/>

</svg>
